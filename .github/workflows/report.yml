name: Daily Uzum Sales Report

on:
  schedule:
    # Har kuni 18:59 UTC = 23:59 Toshkent vaqti (UTC+5)
    - cron: "59 18 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Repositoryni yuklash
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kutubxonalarni o'rnatish
        run: |
          pip install -r requirements.txt

      - name: Hisobotni ishga tushirish
        env:
          UZUM_API_KEY: ${{ secrets.UZUM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
